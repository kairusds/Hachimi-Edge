first_time_setup:
  title: "Unang Beses na Pag-setup"
  welcome_heading: "Maligayang Pagdating"
  welcome_content: >-
    Na-install na ang Hachimi! Gagabayan ka nito sa inisyal na pag-set up.
    Kung hindi ka interesado sa tampok na pagsasalin, maaari mo itong laktawan sa pamamagitan ng pagsara
    ng dialog na ito.


    DISCLAIMER: Isang proyekto na pinangungunahan ng komunidad ang Hachimi. Ginawa ng mga iba't ibang mga kontribyutor ang mga pagsasalin.
    Hindi ito binuo o kakaibat ng Cygames, Inc., at lumalabag ito sa Mga Tuntunin sa Serbisyo. Sa pamamagitan ng pagpatuloy,
    tinatanggap mo na gagamitin mo ito sa iyong sariling peligro.
  translation_repo_heading: "Repo ng pagsasalin"
  select_translation_repo: "Pumili ng repo ng pagsasalin:"
  no_compatible_repo: "Walang mga repo ng pagsasalin ang compatible sa itong bersyon ng laro."
  skip_translation: "Laktawan ang pagsasalin"
  complete_heading: "Tapos na!"
  complete_content: >-
    Pindutin ang Tapos na para i-save ang configuration.
    Kung pumili ka ng repo ng pagsasalin, isasagawa ang pagsusuri ng update,
    na magpo-prompt sa iyo na i-download ang bagong datos ng pagsasalin.

