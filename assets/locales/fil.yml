update_prompt_dialog:
  title: "May bagong update"
  content: |
    May bagong update na available para sa Hachimi (%{version}). Gusto mo ba ito i-install?
    Ire-restart ang laro para ma-apply ang update.
  android_content: |
    May bagong update na available para sa Hachimi (%{version}). Gusto mo ba ito i-install?

    Pindutin ang "Oo" para buksan ang UmaPatcher Edge at i-patch muli ang laro.
    (Hindi kailangan ng pag-download ulit ng laro o APK, kailangan mo lang mag-patch muli tulad ng dati mong ginagawa dahil palaging dina-download ng UmaPatcher Edge ang pinakabagong bersyon ng Hachimi Edge.)

updating_dialog:
  title: "Ina-update..."
  content: "Dina-download ang update, ire-restart ang laro sa ilang sandali..."

steam_overlay_conflict_dialog:
  title: "Paalala"
  content: >-
    Maaaring hindi gumana ang mga pagbili kapag naka-enable ang Hachimi overlay. Kung lumitaw na ang Steam overlay para makabili ka,
    huwag pansinin ang mensaheng ito at pindutin ang Hindi. Kung hindi ito gumana, pindutin ang Oo para pansamantalang i-disable
    ang Hachimi overlay. Isasara nito ang laro, at sa susunod na magsimula ang laro, ang Hachimi overlay ay hindi na gagana at
    makakabili ka na. Pagkatapos nito, maaari mong i-restart muli ang laro para muling i-enable ang Hachimi overlay.
